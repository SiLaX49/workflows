name: Security Scan (reusable)

on:
  workflow_call:
    inputs:
      scan-docker:
        description: "Scanner l'image Docker si Dockerfile présent"
        required: false
        type: boolean
        default: true
      fail-on-score-below:
        description: "Faire échouer le job si le score final est en dessous de cette valeur (0-100). 0 = ne jamais échouer."
        required: false
        type: number
        default: 0
    outputs:
      score:
        description: "Score de sécurité final (0-100)"
        value: ${{ jobs.report.outputs.score }}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  gitleaks:
    name: Secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  trivy-fs:
    name: Dépendances & IaC (Trivy FS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          ignore-unfixed: false
        continue-on-error: true
      - name: Trivy SARIF (Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs.json

  trivy-docker:
    name: Image Docker (Trivy)
    runs-on: ubuntu-latest
    if: ${{ inputs.scan-docker }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Dockerfile
        id: check
        run: |
          if [ -f Dockerfile ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo '{"Results":[]}' > trivy-docker.json
          fi
      - name: Build image
        if: steps.check.outputs.found == 'true'
        run: docker build -t local-scan:ci .
      - name: Trivy image scan
        if: steps.check.outputs.found == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local-scan:ci
          format: json
          output: trivy-docker.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-docker-report
          path: trivy-docker.json

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/security-audit \
            --config=p/secrets \
            --json --output=semgrep.json \
            --severity=ERROR --severity=WARNING --severity=INFO \
            || true
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.json

  report:
    name: Score & Rapport
    runs-on: ubuntu-latest
    needs: [gitleaks, trivy-fs, trivy-docker, semgrep]
    if: always()
    outputs:
      score: ${{ steps.compute.outputs.score }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports
        continue-on-error: true

      - name: Compute score & generate summary
        id: compute
        shell: bash
        run: |
          set -e
          python3 <<'PYEOF'
          import json, os, glob

          WEIGHTS = {"CRITICAL": 10, "HIGH": 5, "MEDIUM": 2, "LOW": 0.5}
          SEV_RANK = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3}
          SEV_EMOJI = {"CRITICAL": "🔴", "HIGH": "🟠", "MEDIUM": "🟡", "LOW": "🔵"}
          counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0}
          per_tool = {}
          findings = []  # list of dicts: tool, severity, location, problem, fix

          def add(tool, sev, location="", problem="", fix=""):
              sev = sev.upper()
              if sev not in counts:
                  return
              counts[sev] += 1
              per_tool.setdefault(tool, {"CRITICAL":0,"HIGH":0,"MEDIUM":0,"LOW":0})[sev] += 1
              findings.append({
                  "tool": tool, "severity": sev,
                  "location": location or "—",
                  "problem": (problem or "")[:120],
                  "fix": (fix or "")[:120],
              })

          # Trivy FS — vulns dans les deps + misconfig (Dockerfile, IaC...)
          for f in glob.glob("reports/trivy-fs-report/trivy-fs.json"):
              try:
                  data = json.load(open(f))
                  for r in data.get("Results", []) or []:
                      target = r.get("Target", "?")
                      for v in r.get("Vulnerabilities", []) or []:
                          loc = f"{target} → {v.get('PkgName','?')} {v.get('InstalledVersion','')}"
                          prob = f"{v.get('VulnerabilityID','?')} — {v.get('Title') or v.get('Description','')}"
                          fix = f"Mettre à jour vers {v.get('FixedVersion','(pas de fix)')}"
                          add("Trivy FS", v.get("Severity","LOW"), loc, prob, fix)
                      for m in r.get("Misconfigurations", []) or []:
                          loc = f"{target}:{(m.get('CauseMetadata') or {}).get('StartLine','?')}"
                          prob = f"{m.get('ID','?')} — {m.get('Title','')}"
                          fix = m.get("Resolution","")
                          add("Trivy FS", m.get("Severity","LOW"), loc, prob, fix)
              except Exception as e:
                  print(f"trivy-fs parse error: {e}")

          # Trivy Docker — CVE OS / libs dans l'image
          for f in glob.glob("reports/trivy-docker-report/trivy-docker.json"):
              try:
                  data = json.load(open(f))
                  for r in data.get("Results", []) or []:
                      target = r.get("Target", "image")
                      for v in r.get("Vulnerabilities", []) or []:
                          loc = f"{v.get('PkgName','?')} {v.get('InstalledVersion','')} (image)"
                          prob = f"{v.get('VulnerabilityID','?')} — {v.get('Title') or v.get('Description','')}"
                          fix = f"Mettre à jour vers {v.get('FixedVersion','(pas de fix)')}"
                          add("Trivy Docker", v.get("Severity","LOW"), loc, prob, fix)
              except Exception as e:
                  print(f"trivy-docker parse error: {e}")

          # Semgrep — SAST avec fichier:ligne
          sev_map = {"ERROR": "HIGH", "WARNING": "MEDIUM", "INFO": "LOW"}
          for f in glob.glob("reports/semgrep-report/semgrep.json"):
              try:
                  data = json.load(open(f))
                  for res in data.get("results", []) or []:
                      sev = sev_map.get(res.get("extra",{}).get("severity","INFO"), "LOW")
                      loc = f"{res.get('path','?')}:{(res.get('start') or {}).get('line','?')}"
                      check = res.get("check_id","?").split(".")[-1]
                      msg = (res.get("extra") or {}).get("message","")
                      prob = f"{check} — {msg}"
                      fix = (res.get("extra") or {}).get("fix") or "Voir doc Semgrep"
                      add("Semgrep", sev, loc, prob, fix)
              except Exception as e:
                  print(f"semgrep parse error: {e}")

          # Gitleaks — secrets exposés (artefact "results.sarif" ou "gitleaks-report.json")
          for f in glob.glob("reports/**/gitleaks*.json", recursive=True) + glob.glob("reports/**/results.sarif", recursive=True):
              try:
                  data = json.load(open(f))
                  if isinstance(data, list):
                      for r in data:
                          loc = f"{r.get('File','?')}:{r.get('StartLine','?')}"
                          prob = f"{r.get('RuleID','?')} — secret détecté"
                          add("Gitleaks", "CRITICAL", loc, prob, "Révoquer le secret + git history rewrite (BFG)")
                  elif "runs" in data:  # SARIF
                      for run in data["runs"]:
                          for r in run.get("results", []) or []:
                              locs = r.get("locations") or [{}]
                              pl = (locs[0].get("physicalLocation") or {})
                              file = (pl.get("artifactLocation") or {}).get("uri","?")
                              line = (pl.get("region") or {}).get("startLine","?")
                              prob = f"{r.get('ruleId','?')} — {(r.get('message') or {}).get('text','secret')}"
                              add("Gitleaks", "CRITICAL", f"{file}:{line}", prob, "Révoquer + nettoyer historique")
              except Exception as e:
                  print(f"gitleaks parse error on {f}: {e}")

          # Score
          score = 100.0
          for sev, n in counts.items():
              score -= n * WEIGHTS[sev]
          score = max(0, round(score, 1))

          if score >= 85:    color, emoji, label = "brightgreen", "🟢", "Excellent"
          elif score >= 60:  color, emoji, label = "yellow", "🟡", "Correct"
          elif score >= 30:  color, emoji, label = "orange", "🟠", "À améliorer"
          else:              color, emoji, label = "red", "🔴", "Critique"

          # GitHub summary
          summary = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary, "w", encoding="utf-8") as s:
              s.write(f"# {emoji} Score sécurité : **{score}/100** — {label}\n\n")
              s.write(f"![score](https://img.shields.io/badge/security-{score}%2F100-{color})\n\n")

              s.write("## Findings par sévérité\n\n")
              s.write("```mermaid\n")
              s.write("xychart-beta\n")
              s.write('  title "Findings par sévérité"\n')
              s.write('  x-axis ["Critical", "High", "Medium", "Low"]\n')
              maxv = max(counts.values()) or 1
              s.write(f'  y-axis "Count" 0 --> {maxv + 1}\n')
              s.write(f'  bar [{counts["CRITICAL"]}, {counts["HIGH"]}, {counts["MEDIUM"]}, {counts["LOW"]}]\n')
              s.write("```\n\n")

              s.write("## Détail par outil\n\n")
              s.write("| Outil | 🔴 Critical | 🟠 High | 🟡 Medium | 🔵 Low |\n")
              s.write("|---|---:|---:|---:|---:|\n")
              for tool, c in sorted(per_tool.items()):
                  s.write(f"| {tool} | {c['CRITICAL']} | {c['HIGH']} | {c['MEDIUM']} | {c['LOW']} |\n")
              s.write(f"| **TOTAL** | **{counts['CRITICAL']}** | **{counts['HIGH']}** | **{counts['MEDIUM']}** | **{counts['LOW']}** |\n\n")

              # Top findings triés par sévérité
              findings.sort(key=lambda x: SEV_RANK[x["severity"]])
              top = findings[:25]
              if top:
                  s.write("## 🎯 Top findings (où sont les problèmes)\n\n")
                  s.write("| | Outil | Emplacement | Problème | Comment fixer |\n")
                  s.write("|---|---|---|---|---|\n")
                  for fnd in top:
                      sev = fnd["severity"]
                      emoji = SEV_EMOJI[sev]
                      loc = fnd["location"].replace("|", "\\|")
                      prob = fnd["problem"].replace("|", "\\|").replace("\n", " ")
                      fix = fnd["fix"].replace("|", "\\|").replace("\n", " ")
                      s.write(f"| {emoji} {sev} | {fnd['tool']} | `{loc}` | {prob} | {fix} |\n")
                  if len(findings) > 25:
                      s.write(f"\n_{len(findings) - 25} findings supplémentaires — voir les artifacts ou l'onglet Security._\n")
                  s.write("\n")
              else:
                  s.write("## ✅ Aucun finding\n\nRien à signaler — score plein.\n\n")

              s.write("## Calcul du score\n\n")
              s.write("Base : 100. Pénalités : Critical -10 / High -5 / Medium -2 / Low -0.5.\n\n")
              s.write("Voir l'onglet **Security** du repo pour la vue complète SARIF (clic vers le code).\n")

          with open(os.environ["GITHUB_OUTPUT"], "a") as o:
              o.write(f"score={score}\n")
              o.write(f"critical={counts['CRITICAL']}\n")
              o.write(f"high={counts['HIGH']}\n")

          print(f"Score: {score}/100  C:{counts['CRITICAL']} H:{counts['HIGH']} M:{counts['MEDIUM']} L:{counts['LOW']}")
          PYEOF

      - name: Enforce minimum score
        if: ${{ inputs.fail-on-score-below > 0 }}
        run: |
          score="${{ steps.compute.outputs.score }}"
          threshold="${{ inputs.fail-on-score-below }}"
          if (( $(echo "$score < $threshold" | bc -l) )); then
            echo "::error::Score $score < seuil $threshold"
            exit 1
          fi
